<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName chirp.feministwiki.org
	DocumentRoot /var/www/social

	ErrorLog ${APACHE_LOG_DIR}/chirp-error.log
	CustomLog ${APACHE_LOG_DIR}/chirp-access.log combined
     
	SSLCertificateFile /etc/letsencrypt/live/feministwiki.org/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/feministwiki.org/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

</VirtualHost>
</IfModule>

