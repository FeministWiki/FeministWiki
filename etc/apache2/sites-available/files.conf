<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName files.feministwiki.org
	DocumentRoot /var/www/files

	ErrorLog ${APACHE_LOG_DIR}/nextcloud-error.log
	CustomLog ${APACHE_LOG_DIR}/nextcloud-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/feministwiki.org/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/feministwiki.org/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

	<Directory /var/www/files/>

		Options +FollowSymlinks
		AllowOverride All

		<IfModule mod_dav.c>
			Dav off
		</IfModule>

		SetEnv HOME /var/www/files
		SetEnv HTTP_HOME /var/www/files

	</Directory>

	Header always set Strict-Transport-Security "max-age=63072000; includeSubdomains;"

</VirtualHost>
</IfModule>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
