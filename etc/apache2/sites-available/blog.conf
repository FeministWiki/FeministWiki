<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName blog.feministwiki.org
	DocumentRoot /var/www/blog

	ErrorLog ${APACHE_LOG_DIR}/blog-error.log
	CustomLog ${APACHE_LOG_DIR}/blog-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/feministwiki.org/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/feministwiki.org/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

	RewriteEngine On

	# Short URL for wiki pages
	RewriteRule ^/?p(/.*)?$ %{DOCUMENT_ROOT}/index.php [L]

	# Redirect / to Main Page
	RewriteRule ^/*$ %{DOCUMENT_ROOT}/index.php [L]

</VirtualHost>
</IfModule>

