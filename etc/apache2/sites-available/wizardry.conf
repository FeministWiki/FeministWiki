<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName wizardcompany.de
	DocumentRoot /var/www/wizardry

	ErrorLog ${APACHE_LOG_DIR}/wizardry-error.log
	CustomLog ${APACHE_LOG_DIR}/wizardry-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/wizardcompany.de/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/wizardcompany.de/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

	<Directory /var/www/wizardry>
		Options -Indexes
	</Directory>

	<Directory /var/www/wizardry/0xDEADBEEF>
		Options +Indexes
	</Directory>

	Include /etc/apache2/default-csp.conf
	Include /etc/apache2/default-fp.conf

</VirtualHost>
</IfModule>

