<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName blogs.feministwiki.org
	DocumentRoot /var/www/blogs

	ErrorLog ${APACHE_LOG_DIR}/blogs-error.log
	CustomLog ${APACHE_LOG_DIR}/blogs-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/feministwiki.org/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/feministwiki.org/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

	<Directory "/var/www/blogs">
		AllowOverride All
	</Directory>

</VirtualHost>
</IfModule>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
