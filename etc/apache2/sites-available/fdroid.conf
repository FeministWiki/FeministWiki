<IfModule mod_ssl.c>
<VirtualHost *:443>

	ServerName fdroid.feministwiki.org
	DocumentRoot /var/www/fdroid

	ErrorLog ${APACHE_LOG_DIR}/fdroid-error.log
	CustomLog ${APACHE_LOG_DIR}/fdroid-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/feministwiki.org/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/feministwiki.org/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf

	<Directory "/var/www/fdroid">
		AllowOverride All
	</Directory>

	Include /etc/apache2/default-csp.conf
	Include /etc/apache2/default-fp.conf

</VirtualHost>
</IfModule>

