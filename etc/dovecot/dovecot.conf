# Basic settings
protocols = imaps
postmaster_address = admin@feministwiki.org

mail_uid = 5000
mail_gid = 5000
mail_privileged_group = vmail
mail_location = maildir:/home/vmail/%n/Maildir

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/vmail/%n
}
passdb {
  driver = ldap
  args = /etc/dovecot/ldap.conf
}

dict {
  expire = ldap:/etc/dovecot/ldap.conf
  quota = ldap:/etc/dovecot/ldap.conf
}

# TLS configuration
ssl = required
ssl_cert = </etc/letsencrypt/live/feministwiki.org/fullchain.pem
ssl_key = </etc/letsencrypt/live/feministwiki.org/privkey.pem

# Configure inbox
namespace inbox {
  inbox = yes
  location = 
  mailbox Drafts {
    special_use = \Drafts
  }
  mailbox Junk {
    special_use = \Junk
  }
  mailbox Sent {
    special_use = \Sent
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    special_use = \Trash
  }
  prefix = 
}

# Disable non-TLS IMAP
service imap-login {
  inet_listener imap {
    port = 0
  }
}

# Auth for Postfix
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
  }
}
