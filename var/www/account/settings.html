<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Change account information</title>
    <link rel="shortcut icon" type="image/png" href="/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="/style.css"/>
  </head>
  <body>
    <h1>Account Settings</h1>
    <form action="actions/change-settings.php" method="post">
      <p>Enter your username and current password here:</p>
      <p><input type="text" name="username" placeholder="Username"/></p>
      <p><input type="password" name="password" placeholder="Password"/></p>
      <p>
        Enter the settings you want to change below. <br/>
        Fields you leave empty will not be updated.
      </p>
      <p><input type="password" name="newPassword" placeholder="New password"/></p>
      <p><input type="password" name="newPassword2" placeholder="Re-type new password"/></p>
      <p><input type="text" name="displayName" placeholder="Display name"/></p>
      <p><input type="text" name="email" placeholder="E-mail address"/></p>
      <p><input type="text" name="recoveryMail" placeholder="Recovery e-mail"/></p>
      <p><input type="submit" value="Save settings"/></p>
    </form>
  </body>
</html>
